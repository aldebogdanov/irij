name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is REQUIRED — the version patch is
          # `git rev-list --count HEAD`, which a shallow clone reports as 1.
          # Also lets us check whether the computed tag already exists.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: irij-jar
          path: build/libs/irij.jar

      # Releasing is GATED to a MANUAL run only (`gh workflow run ci.yml`
      # or the Actions "Run workflow" button). With commit-count versioning
      # every push would otherwise mint a version; a commit-message marker
      # was the first idea but it false-fires when the message merely
      # *mentions* the marker, so dispatch-only is the unambiguous gate.
      # Version is MAJOR.MINOR.<commit-count> — base is `val baseVersion`
      # in build.gradle.kts, patch is `git rev-list --count HEAD`. Tag +
      # release in one step sidesteps the GitHub safeguard that stops
      # GITHUB_TOKEN-pushed tags from triggering a follow-up workflow.
      - name: Gated release (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE=$(grep -E '^val baseVersion = "' build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$BASE" ]; then
            echo "Could not read baseVersion from build.gradle.kts"
            exit 1
          fi
          VERSION="$BASE.$(git rev-list --count HEAD)"
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
            exit 0
          fi
          echo "Tagging + releasing $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            build/libs/irij.jar \
            --title "$TAG" \
            --generate-notes

      # Manual / external tag pushes still go through the original
      # tag-triggered release path — keeps `git tag vX.Y.Z && git push
      # --tags` working as a fallback.
      - name: Create GitHub Release (manual tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/irij.jar
          generate_release_notes: true
