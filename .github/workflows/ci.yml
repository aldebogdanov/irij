name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can check whether `v$VERSION` tag
          # already exists before auto-tagging on a version bump.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: irij-jar
          path: build/libs/irij.jar

      # On main: if build.gradle.kts version doesn't match an existing
      # tag, create the tag AND publish a release in the same step.
      # Doing the release here (instead of via a separate tag-triggered
      # workflow run) sidesteps the GitHub safeguard that prevents
      # GITHUB_TOKEN-pushed tags from triggering follow-up workflows.
      - name: Auto-release on version bump (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep -E '^version = "' build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not read version from build.gradle.kts"
            exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
            exit 0
          fi
          echo "Tagging + releasing $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            build/libs/irij.jar \
            --title "$TAG" \
            --generate-notes

      # Manual / external tag pushes still go through the original
      # tag-triggered release path — keeps `git tag vX.Y.Z && git push
      # --tags` working as a fallback.
      - name: Create GitHub Release (manual tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/irij.jar
          generate_release_notes: true
