<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Irij Playground</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <style>
    :root {
      --bg: #1a1b26;
      --bg2: #24283b;
      --bg3: #1f2335;
      --fg: #c0caf5;
      --fg2: #a9b1d6;
      --accent: #7aa2f7;
      --accent2: #bb9af7;
      --green: #9ece6a;
      --red: #f7768e;
      --yellow: #e0af68;
      --border: #3b4261;
      --gutter: #565f89;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    header h1 span { color: var(--fg2); font-weight: 400; }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      font-family: inherit;
      font-size: 13px;
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--bg3);
      color: var(--fg);
      transition: all 0.15s;
    }
    button:hover { background: var(--border); }
    button.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }
    button.primary:hover { opacity: 0.9; }
    select {
      font-family: inherit;
      font-size: 13px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg3);
      color: var(--fg);
      cursor: pointer;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-bottom: 2px solid var(--border);
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--gutter);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .panel-header .shortcut {
      font-size: 11px;
      color: var(--gutter);
      opacity: 0.7;
    }
    .CodeMirror {
      flex: 1;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--fg);
    }
    .CodeMirror-gutters {
      background: var(--bg);
      border-right: 1px solid var(--border);
    }
    .CodeMirror-linenumber { color: var(--gutter); }
    .CodeMirror-cursor { border-left-color: var(--accent); }
    .CodeMirror-selected { background: rgba(122, 162, 247, 0.15) !important; }
    .CodeMirror-activeline-background { background: rgba(122, 162, 247, 0.05); }
    .output-panel {
      flex: 0 0 35%;
      display: flex;
      flex-direction: column;
      min-height: 120px;
    }
    .output {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .output .value { color: var(--green); }
    .output .stdout { color: var(--fg2); }
    .output .error { color: var(--red); }
    .output .info { color: var(--gutter); font-style: italic; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--gutter);
    }
    .status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }
    .status .dot.running { background: var(--yellow); animation: pulse 1s infinite; }
    .status .dot.error { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .spinner.active { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Share modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
    }
    .modal h3 { margin-bottom: 12px; color: var(--accent); }
    .modal input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-family: inherit;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<header>
  <h1>Irij <span>Playground</span></h1>
  <div class="toolbar">
    <select id="examples">
      <option value="">-- Examples --</option>
    </select>
    <button onclick="shareCode()">Share</button>
    <button class="primary" onclick="runCode()">
      <span class="spinner" id="run-spinner"></span>
      Run
    </button>
  </div>
</header>

<div class="main">
  <div class="editor-panel">
    <div class="panel-header">
      <span>Editor</span>
      <span class="shortcut">Ctrl+Enter to run</span>
    </div>
    <textarea id="code">println "Hello, Irij!"</textarea>
  </div>
  <div class="output-panel">
    <div class="panel-header">
      <span>Output</span>
      <button onclick="clearOutput()" style="padding: 2px 10px; font-size: 11px;">Clear</button>
    </div>
    <div class="output" id="output">
      <span class="info">Press Ctrl+Enter or click Run to evaluate.</span>
    </div>
  </div>
</div>

<div class="status">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Ready</span>
</div>

<!-- Share modal -->
<div class="modal-overlay" id="share-modal">
  <div class="modal">
    <h3>Share Code</h3>
    <p style="font-size: 13px; color: var(--fg2); margin-bottom: 12px;">
      Copy the URL below to share your code:
    </p>
    <input id="share-url" readonly onclick="this.select()">
    <div class="actions">
      <button onclick="closeShareModal()">Close</button>
      <button class="primary" onclick="copyShareUrl()">Copy URL</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script>
  const editor = CodeMirror.fromTextArea(document.getElementById('code'), {
    lineNumbers: true,
    theme: 'default',
    indentUnit: 2,
    tabSize: 2,
    indentWithTabs: false,
    styleActiveLine: true,
    matchBrackets: true,
    extraKeys: {
      'Ctrl-Enter': runCode,
      'Cmd-Enter': runCode,
    }
  });

  // Load code from URL hash
  const hash = window.location.hash.slice(1);
  if (hash) {
    try {
      const code = decodeURIComponent(atob(hash));
      editor.setValue(code);
    } catch(e) { /* ignore bad hash */ }
  }

  // Load examples
  fetch('/api/examples')
    .then(r => r.json())
    .then(examples => {
      const sel = document.getElementById('examples');
      examples.forEach((ex, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = ex.title;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => {
        const idx = parseInt(sel.value);
        if (!isNaN(idx) && examples[idx]) {
          editor.setValue(examples[idx].code);
          clearOutput();
        }
        sel.value = '';
      });
    })
    .catch(() => { /* examples endpoint not available */ });

  let running = false;

  async function runCode() {
    if (running) return;
    running = true;

    const code = editor.getValue();
    const output = document.getElementById('output');
    const spinner = document.getElementById('run-spinner');
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    output.innerHTML = '';
    spinner.classList.add('active');
    dot.className = 'dot running';
    statusText.textContent = 'Evaluating...';

    const start = performance.now();

    try {
      const resp = await fetch('/eval', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, timeout: 10000 })
      });
      const result = await resp.json();
      const elapsed = Math.round(performance.now() - start);

      if (result.ok) {
        if (result.stdout) {
          const stdoutEl = document.createElement('span');
          stdoutEl.className = 'stdout';
          stdoutEl.textContent = result.stdout;
          output.appendChild(stdoutEl);
        }
        if (result.value && result.value !== '()') {
          const valEl = document.createElement('span');
          valEl.className = 'value';
          valEl.textContent = (result.stdout ? '\n' : '') + '=> ' + result.value;
          output.appendChild(valEl);
        }
        if (!result.stdout && (!result.value || result.value === '()')) {
          const infoEl = document.createElement('span');
          infoEl.className = 'info';
          infoEl.textContent = '(no output)';
          output.appendChild(infoEl);
        }
        dot.className = 'dot';
        statusText.textContent = `Done in ${elapsed}ms`;
      } else {
        const errEl = document.createElement('span');
        errEl.className = 'error';
        errEl.textContent = result.error;
        if (result.stdout) {
          const stdoutEl = document.createElement('span');
          stdoutEl.className = 'stdout';
          stdoutEl.textContent = result.stdout + '\n';
          output.appendChild(stdoutEl);
        }
        output.appendChild(errEl);
        dot.className = 'dot error';
        statusText.textContent = `Error (${elapsed}ms)`;
      }
    } catch (e) {
      const errEl = document.createElement('span');
      errEl.className = 'error';
      errEl.textContent = 'Network error: ' + e.message;
      output.appendChild(errEl);
      dot.className = 'dot error';
      statusText.textContent = 'Connection failed';
    } finally {
      spinner.classList.remove('active');
      running = false;
    }
  }

  function clearOutput() {
    document.getElementById('output').innerHTML =
      '<span class="info">Press Ctrl+Enter or click Run to evaluate.</span>';
    document.getElementById('status-dot').className = 'dot';
    document.getElementById('status-text').textContent = 'Ready';
  }

  function shareCode() {
    const code = editor.getValue();
    const encoded = btoa(encodeURIComponent(code));
    const url = window.location.origin + window.location.pathname + '#' + encoded;
    document.getElementById('share-url').value = url;
    document.getElementById('share-modal').classList.add('active');
    window.history.replaceState(null, '', '#' + encoded);
  }

  function closeShareModal() {
    document.getElementById('share-modal').classList.remove('active');
  }

  function copyShareUrl() {
    const input = document.getElementById('share-url');
    input.select();
    navigator.clipboard.writeText(input.value).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy URL'; }, 1500);
    });
  }
</script>

</body>
</html>
